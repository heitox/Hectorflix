<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style4.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">

    <title>Login | HectorFlix</title>
</head>
<body>
    <header class="header">
        <section>
            <a href="#" class="logo">
                <img width="100" src="./img/ChatGPT Image 4 de fev. de 2026, 10_32_49.png" alt="logo">
            </a>

           <nav class="navbar">
                <a href="./login.html">Login</a>
                <a href="./index.html">Sobre</a>
                <a href="./index.html">Catalogo</a>
            </nav>

            <div class="icons">
                <img width="30" height="30" src="https://img.icons8.com/ios/50/ffffff/search--v1.png"
                    alt="search--v1" />
            </div>
        </section>
        </header>

    <div class="login-container">
        <h1 class="logo"><span> SUPORTE </span> HECTORFLIX</h1>

        <h3 class="sub-title">Mensagem Enviada <br>Aguarde nosso contato pelo e-mail </h3>

        <form class="login-form">
            <label for="username">Nome</label>
            <input type="text" id="username" placeholder="Digite seu Nome">

            <label for="E-mail">E-mail</label>
            <input type="email" id="email" placeholder="Digite sua email">

            <label for="Telefone">Telefone (opcional)</label>
            <input type="tel" id="telefone" placeholder="(11) 99999-9999">

            <label for="assunto">Assunto</label>
            <input type="text" id="assunto" placeholder="Fale sobre qual é o assunto">

            <label for="duvida">Duvida</label>
            <input type="text" id="duvida" placeholder="Fale sobre sua duvida">
        </form>
            
        <form class="btn" action="./"> 
            <input type="submit" value="Enviar" >
        </form>
    </div>

</body>
</html>
