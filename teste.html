<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HectorFlix</title>

    <!-- CSS -->
    <link rel="stylesheet" href="teste.css">
</head>
<body>

    <!-- MENU -->

        <div class="logo">HECTORFLIX</div>

        <nav class="navbar">

        <div class="profile">

            <div class="box">
                <img src="img/filme-2.jpg" alt="Filme 2">
                <h3>Scarface</h3>

            <div class="box">
                <img src="img/filme3.jpg" alt="Filme 3">

            <div class="box">
                <img src="img/filme4.jpg" alt="Filme 4">

</body>
</html>
